<!DOCTYPE html>
<html>
<head>
  <title>Glowspace</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .intro {
      margin: 20px auto;
      padding: 20px;
      max-width: 600px;
      background: white;
      border-radius: 10px;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    .card img {
      width: 200px;
      border-radius: 10px;
    }

    .form-box {
      margin: 30px auto;
      width: 300px;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: #6C63FF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .message-box {
      background: white;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Glowspace</h1>

<div class="intro">
I’m Aradhana, a designer and frontend developer specializing in crafting interfaces that feel as good as they look. I believe digital experiences should be intuitive, unobtrusive, and visually calming.
</div>

<div class="products">
  <div class="card">
    <img src="images/product1.webp">
    <p>Product 1</p>
  </div>

  <div class="card">
    <img src="images/product2.webp">
    <p>Product 2</p>
  </div>
</div>

<div class="form-box">
  <!-- IMPORTANT: NO action -->
  <form onsubmit="saveData(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <textarea id="message" placeholder="Your Message" required></textarea>
    <button type="submit">Send</button>
  </form>
</div>

<button onclick="viewData()">View Messages</button>

<div id="output"></div>

<script>
function saveData(event) {
  event.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;

  let data = JSON.parse(localStorage.getItem("messages")) || [];

  data.push({ name: name, email: email, message: message });

  localStorage.setItem("messages", JSON.stringify(data));

  alert("Saved successfully!");

  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
  document.getElementById("message").value = "";
}

function viewData() {
  let data = JSON.parse(localStorage.getItem("messages")) || [];

  let output = "";

  if (data.length === 0) {
    output = "<p>No messages yet</p>";
  } else {
    for (let i = 0; i < data.length; i++) {
      output += "<div class='message-box'>" +
        "<h3>" + data[i].name + "</h3>" +
        "<p>" + data[i].email + "</p>" +
        "<p>" + data[i].message + "</p>" +
      "</div>";
    }
  }

  document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
